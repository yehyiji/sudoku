    const transpose = (matrix) => matrix[0].map((_, colIndex) => matrix.map(row => row[colIndex]));

    function getSolutionGrid(puzzleCells, sizeDef) {
        const { size, boxW, boxH, chars } = sizeDef;
        const grid = Array(size).fill(null).map(() => Array(size).fill(null));
        puzzleCells.forEach(c => { if(c.isGiven) grid[c.y][c.x] = chars.indexOf(c.value); });
        
        function getCandidates(y, x, g) {
            let used = Array(size).fill(false);
            for (let i = 0; i < size; i++) { if (g[y][i] !== null) used[g[y][i]] = true; if (g[i][x] !== null) used[g[i][x]] = true; }
            const by = Math.floor(y / boxH) * boxH, bx = Math.floor(x / boxW) * boxW;
            for (let dy = 0; dy < boxH; dy++) for (let dx = 0; dx < boxW; dx++) { let v = g[by+dy][bx+dx]; if(v !== null) used[v] = true; }
            let cands = []; for (let v = 0; v < size; v++) if (!used[v]) cands.push(v); return cands;
        }

        const solveGrid = grid.map(r => [...r]);
        function backtrack(g) {
            let bestY = -1, bestX = -1, minCands = size + 1, bestCands = null;
            for (let y = 0; y < size; y++) for (let x = 0; x < size; x++) {
                if (g[y][x] === null) {
                    const cands = getCandidates(y, x, g);
                    if (cands.length === 0) return false;
                    if (cands.length < minCands) { minCands = cands.length; bestY = y; bestX = x; bestCands = cands; if(minCands===1) break; }
                }
            }
            if (bestY === -1) return true;
            for (let c of bestCands) { g[bestY][bestX] = c; if (backtrack(g)) return true; g[bestY][bestX] = null; }
            return false;
        }

        if (backtrack(solveGrid)) return solveGrid.map(row => row.map(v => chars[v]));
        return null;
    }

    function countSolutions(grid, size, boxW, boxH, limit = 2) {
        let count = 0;
        const getCandidates = (y, x) => {
            let used = new Array(size).fill(false);
            for (let i = 0; i < size; i++) {
                if (grid[y][i] !== null) used[grid[y][i]] = true;
                if (grid[i][x] !== null) used[grid[i][x]] = true;
            }
            const by = Math.floor(y / boxH) * boxH;
            const bx = Math.floor(x / boxW) * boxW;
            for (let dy = 0; dy < boxH; dy++) {
                for (let dx = 0; dx < boxW; dx++) {
                    let val = grid[by + dy][bx + dx];
                    if (val !== null) used[val] = true;
                }
            }
            let candidates = [];
            for (let v = 0; v < size; v++) if (!used[v]) candidates.push(v);
            return candidates;
        };

        const solve = () => {
            let minCandidates = size + 1;
            let bestY = -1; let bestX = -1; let bestCand = null;
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    if (grid[y][x] === null) {
                        const cands = getCandidates(y, x);
                        if (cands.length === 0) return false; 
                        if (cands.length < minCandidates) { minCandidates = cands.length; bestY = y; bestX = x; bestCand = cands; if (minCandidates === 1) break; }
                    }
                }
                if (minCandidates === 1) break;
            }
            if (bestY === -1) { count++; return count >= limit; }
            for (let i = 0; i < bestCand.length; i++) {
                grid[bestY][bestX] = bestCand[i];
                if (solve()) { grid[bestY][bestX] = null; return true; }
                grid[bestY][bestX] = null;
            }
            return false;
        };
        solve(); return count;
    }

    async function generateSudokuAsync(sizeId, diffId, onProgress) {
        const sizeDef = SIZES.find(s => s.id === sizeId);
        const diffDef = DIFFICULTIES.find(d => d.id === diffId);
        const targetRange = diffDef.targets[sizeId];
        const targetClues = Math.floor(Math.random() * (targetRange[1] - targetRange[0] + 1)) + targetRange[0];
        const targetMax = targetRange[1];
        const { size, boxW, boxH, chars } = sizeDef;
        
        let bestResult = null;
        let minCluesAchieved = Infinity;
        const maxAttempts = size === 16 ? 8 : 40;
        const generationStartTime = Date.now();
        let isTimedOut = false; let lastTick = 0;

        for (let attempt = 1; attempt <= maxAttempts; attempt++) {
            if (isTimedOut) break;

            let grid = (size === 4 ? BASE_4 : size === 9 ? BASE_9 : BASE_16).map(row => [...row]);
            const charPool = [...chars]; charPool.sort(() => Math.random() - 0.5);
            grid = grid.map(row => row.map(val => charPool[val]));

            for (let i = 0; i < size; i += boxH) { const block = grid.slice(i, i + boxH); block.sort(() => Math.random() - 0.5); grid.splice(i, boxH, ...block); }
            grid = transpose(grid);
            for (let i = 0; i < size; i += boxW) { const block = grid.slice(i, i + boxW); block.sort(() => Math.random() - 0.5); grid.splice(i, boxW, ...block); }
            grid = transpose(grid);
            const bands = []; for(let i=0; i<size; i+=boxH) bands.push(grid.slice(i, i+boxH)); bands.sort(() => Math.random() - 0.5); grid = bands.flat();
            grid = transpose(grid);
            const stacks = []; for(let i=0; i<size; i+=boxW) stacks.push(grid.slice(i, i+boxW)); stacks.sort(() => Math.random() - 0.5); grid = transpose(stacks.flat());

            let puzzle = grid.map(r => [...r]);
            const positions = [];
            for(let y=0; y<size; y++) for(let x=0; x<size; x++) positions.push({x,y});
            positions.sort(() => Math.random() - 0.5);

            let currentClues = size * size; let failCount = 0; const maxCheckHoles = positions.length; 
            const testGrid = puzzle.map(r => [...r]);

            for (let i = 0; i < maxCheckHoles; i++) {
                const now = Date.now();
                const elapsedSecs = Math.floor((now - generationStartTime) / 1000);

                if (elapsedSecs >= 20) {
                    const remainingSecs = 30 - elapsedSecs;
                    if (remainingSecs <= 0) { isTimedOut = true; break; }
                    if (now - lastTick >= 1000) { lastTick = now; if (onProgress) onProgress(`題目生成不超過 ${remainingSecs} 秒...`); await new Promise(r => setTimeout(r, 15)); }
                }
                if (currentClues <= targetClues) break; 

                const p1 = positions[i]; const p2 = { x: size - 1 - p1.x, y: size - 1 - p1.y };

                if (puzzle[p1.y][p1.x] !== null) {
                    const backup1 = puzzle[p1.y][p1.x]; const backup2 = puzzle[p2.y][p2.x];
                    puzzle[p1.y][p1.x] = null; testGrid[p1.y][p1.x] = null;
                    let removed = 1;
                    if (p1.x !== p2.x || p1.y !== p2.y) { puzzle[p2.y][p2.x] = null; testGrid[p2.y][p2.x] = null; removed = 2; }
                    const testNumGrid = testGrid.map(row => row.map(v => v === null ? null : chars.indexOf(v)));
                    
                    if (countSolutions(testNumGrid, size, boxW, boxH, 2) !== 1) {
                        puzzle[p1.y][p1.x] = backup1; testGrid[p1.y][p1.x] = backup1;
                        if (removed === 2) { puzzle[p2.y][p2.x] = backup2; testGrid[p2.y][p2.x] = backup2; }
                        failCount++;
                    } else {
                        currentClues -= removed; failCount = 0; 
                        if (currentClues < minCluesAchieved) { minCluesAchieved = currentClues; bestResult = puzzle.map(r => [...r]); if (elapsedSecs < 20 && onProgress) { onProgress(`挑戰極限難度... (目標: ${targetClues}格, 目前最佳: ${minCluesAchieved}格)`); } }
                    }
                    if (currentClues <= targetMax && failCount > 25) break;
                }
                if (size === 16 || i % 15 === 0) await new Promise(r => setTimeout(r, 0));
            }
            if (currentClues <= targetMax || isTimedOut) break; 
        }

        if (!bestResult) bestResult = grid;

        const cells = [];
        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                const isGiven = bestResult[y][x] !== null;
                cells.push({
                    id: `${x}-${y}`, x: x, y: y, boxId: Math.floor(x/boxW) + Math.floor(y/boxH) * (size/boxW),
                    value: isGiven ? bestResult[y][x] : null, isGiven: isGiven, drafts: [], owner: null, isSystemRevealed: false
                });
            }
        }
        return { sizeDef, diffDef, cells };
    }

    function formatTime(secs) { return String(Math.floor(secs / 60)).padStart(2, '0') + ":" + String(secs % 60).padStart(2, '0'); }

    function GameTimer({ startTime, endTime, isRunning, matchPhase }) {
        const [now, setNow] = useState(Date.now());
        useEffect(() => {
            if (!isRunning) return;
            setNow(Date.now()); const t = setInterval(() => setNow(Date.now()), 1000);
            return () => clearInterval(t);
        }, [isRunning, startTime]);
        let secs = 0;
        if (matchPhase === 'playing' || matchPhase === 'finished') {
            secs = Math.max(0, Math.floor(((endTime || now) - startTime) / 1000));
        }
        return <span>⏱ {formatTime(secs)}</span>;
    }

      const playerIdRef = useRef(Math.random().toString(36).substring(2, 12));
      const myId = playerIdRef.current;
      const myNameRef = useRef("");
      const myColorRef = useRef(COLORS[Math.floor(Math.random() * COLORS.length)]); 

      const emptyLevelData = { sizeDef: SIZES[1], diffDef: DIFFICULTIES[1], cells: [] };
      const initialDataRef = useRef(emptyLevelData);

      const [user, setUser] = useState(null);
      const [authError, setAuthError] = useState(""); 
      const [screen, setScreen] = useState('home');
      const [engine, setEngine] = useState('none');
      
      const [sizeId, setSizeId] = useState(9); 
      const [diffId, setDiffId] = useState('medium'); 
      
      const [levelData, setLevelData] = useState(initialDataRef.current);
      const [cells, setCells] = useState(initialDataRef.current.cells);
      const [localCells, setLocalCells] = useState([]); 
      const solutionGridRef = useRef(null); 
      const [ghostHints, setGhostHints] = useState({}); 
      const [isGhostRace, setIsGhostRace] = useState(false);
      const [isBrawlMode, setIsBrawlMode] = useState(false);
      const [brawlWinners, setBrawlWinners] = useState([]);
      const [brawlSettings, setBrawlSettings] = useState({ winnersCount: 3, allowQuickFill: false, allowTraversal: false, allowYellowHint: false, hideAnswers: true, allowOthersToPlayAgain: true, allowGifts: true });
      const [showBrawlSettings, setShowBrawlSettings] = useState(false);
      const [winner, setWinner] = useState(null); 
      const isWinnerDeclaredRef = useRef(false);

      const [matchPhase, setMatchPhase] = useState('playing'); 
      const [countdownTarget, setCountdownTarget] = useState(null);
      const [countdownValue, setCountdownValue] = useState(null);


      const [isSpectator, setIsSpectator] = useState(false);

      const [strokes, setStrokes] = useState([]);
      const [history, setHistory] = useState([]);
      const [isWon, setIsWon] = useState(false);
      const [hideVictoryModal, setHideVictoryModal] = useState(false);
      const [toastMsg, setToastMsg] = useState("");
      
      const [startTime, setStartTime] = useState(Date.now());
      const [endTime, setEndTime] = useState(null);
      const [matchStartTime, setMatchStartTime] = useState(null);

      const [zoomLevel, setZoomLevel] = useState(1);
      const [isHeaderCollapsed, setIsHeaderCollapsed] = useState(false);
      const [showSaveModal, setShowSaveModal] = useState(false);
      const [saveCode, setSaveCode] = useState("");

      const [interactionMode, setInteractionMode] = useState(0);
      const [drawSubMode, setDrawSubMode] = useState('pen');
      const [selectedChar, setSelectedChar] = useState(null); 
      
      // 禮物與反擊機制 (盤面直接覆蓋)
      const [unopenedGifts, setUnopenedGifts] = useState({});
      const [keyMapping, setKeyMapping] = useState(initialDataRef.current.sizeDef.chars);
      const [flippedKeys, setFlippedKeys] = useState([]); 
      const [flares, setFlares] = useState([]);

      const processedEventsRef = useRef(new Set());
      const completedRegionsRef = useRef(new Set());
      const scrambledCharsRef = useRef(new Set()); 

      const modeIcons = ['🖋️', '✏️', '🖌️'];
      const modeTitles = ['填答模式', '草稿模式', '畫筆作記號'];

      const [zoomModeIdx, setZoomModeIdx] = useState(0); 
      const [isClosingModal, setIsClosingModal] = useState(false);
      
      const [isGenerating, setIsGenerating] = useState(false);
      const [genProgress, setGenProgress] = useState("");
      const isAutoFillingRef = useRef(false);

      const [colorPickerTarget, setColorPickerTarget] = useState(null);
      const [colorSeq, setColorSeq] = useState([]);
      const [editName, setEditName] = useState("");

      const [roomId, setRoomId] = useState("");
      const [isHost, setIsHost] = useState(false);
      const isHostRef = useRef(false);
      const [tempRoomId, setTempRoomId] = useState("");
      const [tempPlayerName, setTempPlayerName] = useState("");
      const [stableMode, setStableMode] = useState(false); 
      const [titleClicks, setTitleClicks] = useState(0);
      
      const [playersList, setPlayersList] = useState([{ id: myId, name: "單機玩家", isHost: true, color: COLORS[11], isReady: false, isSpectator: false }]);
      const [isConnecting, setIsConnecting] = useState(false);

      const [showOtherCursors, setShowOtherCursors] = useState(true);
      const [showGhostProgress, setShowGhostProgress] = useState(true);
      const [cursors, setCursors] = useState({});
      const [ripples, setRipples] = useState([]);
      
      const isMultiplayer = engine !== 'none';
      const svgRef = useRef(null);
      const lastCursorSend = useRef(0);
      const isDrawingRef = useRef(false);
      
      const cellLongPressTimer = useRef(null);
      const isLongPressTriggered = useRef(false);
      const touchStartPt = useRef(null);

      const engineRef = useRef('none');
      const peerRef = useRef(null);
      const connRef = useRef(null); 
      const connsRef = useRef([]); 
      const roomRef = useRef(null);
      const unsubRef = useRef(null);
      const zoomContainerRef = useRef(null);
const lastPinchDist = useRef(null);
      const stateRef = useRef({ cells: [], localCells: [], levelData: null, startTime: Date.now(), sizeId: 9, diffId: 'medium', strokes: [], isGenerating: false, selectedChar: null, isGhostRace: false, isBrawlMode: false, brawlWinners: [], brawlSettings: { winnersCount: 3, allowQuickFill: false, allowTraversal: false, allowYellowHint: false, hideAnswers: true, allowOthersToPlayAgain: true, allowGifts: true }, winner: null, isAutoFilling: false, matchPhase: 'playing', countdownTarget: null, giftEvents: [], keyMapping: [], unopenedGifts: {} });
      
      const playersListRef = useRef([]);

      const handleMultiplayerWinRef = useRef(null);
      handleMultiplayerWinRef.current = (winInfo) => {
          if (!stateRef.current.isGhostRace && !stateRef.current.isBrawlMode) return;
          if (stateRef.current.brawlWinners.some(w => w.id === winInfo.id)) return;
          
          const curWinners = stateRef.current.brawlWinners;
          const newWinners = [...curWinners, winInfo];
          const winnersIds = newWinners.map(w => w.id || w.uid);
          const playingPlayers = playersListRef.current.filter(p => !p.isSpectator && !p.isHost);
          
          const winnersLimit = stateRef.current.isBrawlMode ? (stateRef.current.brawlSettings.winnersCount || 1) : 1;
          const allDone = (newWinners.length >= winnersLimit) || (playingPlayers.length > 0 && playingPlayers.every(p => winnersIds.includes(p.id)));
          
          const winnerObj = stateRef.current.isBrawlMode ? (newWinners[0] || winInfo) : winInfo;

          stateRef.current.brawlWinners = newWinners;
          if (allDone) {
              stateRef.current.matchPhase = 'finished';
              stateRef.current.winner = winnerObj;
          }
          
          setBrawlWinners(newWinners);
          if (allDone) {
              setMatchPhase('finished');
              setWinner(winnerObj);
          }

          if (engineRef.current === 'firebase' && roomRef.current) {
              const updatePayload = { "gameState.brawlWinners": newWinners };
              if (allDone) {
                  updatePayload["gameState.matchPhase"] = 'finished';
                  updatePayload["gameState.winner"] = winnerObj;
              }
              updateDoc(roomRef.current, updatePayload).catch(e => {});
          }
          else if (engineRef.current === 'peerjs' && isHostRef.current) {
              const syncData = { brawlWinners: newWinners };
              if (allDone) {
                  syncData.matchPhase = 'finished';
                  syncData.winner = winnerObj;
              }
              syncState(syncData, true);
          }
      };

      const zoomLevelRef = useRef(1);
      const zoomModeIdxRef = useRef(0);
      const currentPathDataRef = useRef("");
      const drawingPathRef = useRef(null);
      const eraserRef = useRef(null);
      const lastEraseTimeRef = useRef(0);
      const handleBrawlWinRef = useRef(null);

      handleBrawlWinRef.current = (winInfo) => {
          if (handleMultiplayerWinRef.current) handleMultiplayerWinRef.current(winInfo);
      };

      const cSizeDef = levelData.sizeDef;
      const CELL_SIZE = 60;
      const PADDING = 20;
      const svgW = cSizeDef.size * CELL_SIZE + PADDING * 2;
      const svgH = cSizeDef.size * CELL_SIZE + PADDING * 2;
      const MAX_SAFE_DIMENSION = 4000;

      const activeCells = isGhostRace ? localCells : cells;

      useEffect(() => { playersListRef.current = playersList; }, [playersList]);

      // 定期清理過期的盤面禮物 (已經廢棄，禮物永久保存不用清理)

      useEffect(() => {
        if (matchPhase === 'countdown' && countdownTarget) {
            const checkTime = () => {
                const remaining = Math.ceil((countdownTarget - Date.now()) / 1000);
                if (remaining > 0) {
                    setCountdownValue(remaining);
                } else {
                    setCountdownValue(null);
                    if (stateRef.current.matchPhase !== 'playing') {
                        setMatchPhase('playing');
                        setStartTime(countdownTarget);
                        setMatchStartTime(countdownTarget);
                        stateRef.current.matchPhase = 'playing';
                        stateRef.current.startTime = countdownTarget;
                    }
                }
            };
            checkTime();
            const interval = setInterval(checkTime, 100);
            return () => clearInterval(interval);
        } else {
            setCountdownValue(null);
        }
      }, [matchPhase, countdownTarget]);

      useEffect(() => {
          if (!isHostRef.current && isMultiplayer) return;
          if (matchPhase === 'waiting' && playersList.length > 0) {
              const allReady = playersList.filter(p => !p.isSpectator).every(p => p.isReady);
              if (allReady && playersList.filter(p => !p.isSpectator).length > 0) {
                  const target = Date.now() + 5000;
                  syncState({ matchPhase: 'countdown', countdownTarget: target }, true);
              }
          }
      }, [playersList, matchPhase, isMultiplayer]);

      useEffect(() => {
          setGhostHints({});
          completedRegionsRef.current.clear();
          setUnopenedGifts({});
          scrambledCharsRef.current.clear();
          processedEventsRef.current.clear();
      }, [startTime]);

      const completedChars = useMemo(() => {
          const counts = {};
          activeCells.forEach(c => { if (c.value !== null) counts[c.value] = (counts[c.value] || 0) + 1; });
          const completed = new Set();
          if (cSizeDef && cSizeDef.chars) { for (const char of cSizeDef.chars) if (counts[char] >= cSizeDef.size) completed.add(char); }
          return completed;
      }, [activeCells, cSizeDef]);

      useEffect(() => { if (selectedChar && completedChars.has(selectedChar)) setSelectedChar(null); }, [completedChars, selectedChar]);

      useEffect(() => {
          if (screen !== 'game' || isSpectator) return;
          const handleKeyDown = (e) => {
              if (interactionMode >= 2 || isAutoFillingRef.current || matchPhase !== 'playing') return;
              const key = e.key.toUpperCase();
              const origIdx = cSizeDef.chars.indexOf(key);
              if (origIdx !== -1) {
                  const mappedKey = keyMapping[origIdx];
                  if (!completedChars.has(mappedKey)) setSelectedChar(prev => prev === mappedKey ? null : mappedKey);
              } else if (e.key === 'q' || e.key === 'Q') toggleInteractionMode();
          };
          window.addEventListener('keydown', handleKeyDown);
          return () => window.removeEventListener('keydown', handleKeyDown);
      }, [screen, cSizeDef.chars, interactionMode, completedChars, matchPhase, isSpectator, keyMapping]);

      const getPlayerColor = (uid) => { const p = playersList.find(p => p.id === uid); return p ? p.color : COLORS[11]; }; 
      
      const myCurrentColor = getPlayerColor(myId);
      const _mePlayer = playersList.find(p => p.id === myId);
      myNameRef.current = _mePlayer ? _mePlayer.name : "";
      myColorRef.current = myCurrentColor;

      useEffect(() => { zoomLevelRef.current = zoomLevel; }, [zoomLevel]);
      useEffect(() => { zoomModeIdxRef.current = zoomModeIdx; }, [zoomModeIdx]);

      // 同步本地觀戰狀態與伺服器列表中的身分
      useEffect(() => {
          const me = playersList.find(p => p.id === myId);
          if (me && me.isSpectator !== isSpectator) {
              setIsSpectator(me.isSpectator);
          }
      }, [playersList, myId]);

      useEffect(function() {
        const initAuth = async function() {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth);
          } catch(err) { setAuthError(err.code || err.message); }
        };
        initAuth(); onAuthStateChanged(auth, function(u) { if(u) setUser(u); });
      }, []);

      useEffect(function() { stateRef.current = { ...stateRef.current, cells, localCells, levelData, startTime, sizeId, diffId, strokes, isGhostRace, isBrawlMode, brawlWinners, brawlSettings, winner, matchPhase, countdownTarget, keyMapping, unopenedGifts }; }, [cells, localCells, levelData, startTime, sizeId, diffId, strokes, isGhostRace, isBrawlMode, brawlWinners, brawlSettings, winner, matchPhase, countdownTarget, keyMapping, unopenedGifts]);

      const conflictCellIds = useMemo(() => {
        const conflicts = new Set();
        const grid = Array(cSizeDef.size).fill(null).map(() => Array(cSizeDef.size).fill(null));
        activeCells.forEach(c => { if (c.value) grid[c.y][c.x] = c; });

        for (let i=0; i<cSizeDef.size; i++) {
            const rowSeen = {}; const colSeen = {};
            for (let j=0; j<cSizeDef.size; j++) {
                let cr = grid[i][j]; if (cr) { if (rowSeen[cr.value]) { conflicts.add(cr.id); conflicts.add(rowSeen[cr.value].id); } else rowSeen[cr.value] = cr; }
                let cc = grid[j][i]; if (cc) { if (colSeen[cc.value]) { conflicts.add(cc.id); conflicts.add(colSeen[cc.value].id); } else colSeen[cc.value] = cc; }
            }
        }
        for (let by=0; by<cSizeDef.size; by+=cSizeDef.boxH) {
            for (let bx=0; bx<cSizeDef.size; bx+=cSizeDef.boxW) {
                const boxSeen = {};
                for (let dy=0; dy<cSizeDef.boxH; dy++) {
                    for (let dx=0; dx<cSizeDef.boxW; dx++) {
                        let cb = grid[by+dy][bx+dx];
                        if (cb) { if (boxSeen[cb.value]) { conflicts.add(cb.id); conflicts.add(boxSeen[cb.value].id); } else boxSeen[cb.value] = cb; }
                    }
                }
            }
        }
        return conflicts;
      }, [activeCells, cSizeDef]);

      const totalEmpty = useMemo(() => {
          const targetCells = isGhostRace ? localCells : cells;
          if (!targetCells || targetCells.length === 0) return 1; 
          return targetCells.filter(c => !c.isGiven).length || 1;
      }, [isGhostRace, localCells, cells]);

      const playerProgress = useMemo(() => {
          if (isGhostRace) return [];
          const counts = {};
          cells.forEach(c => {
              if (!c.isGiven && c.value !== null && !conflictCellIds.has(c.id) && c.owner) counts[c.owner] = (counts[c.owner] || 0) + 1;
          });
          return Object.entries(counts).map(([uid, count]) => ({ uid, color: getPlayerColor(uid), pct: Math.round((count / totalEmpty) * 100) }));
      }, [cells, conflictCellIds, totalEmpty, playersList, isGhostRace]);

      // 為幽靈競速模式建立所有人的獨立進度
      const ghostProgress = useMemo(() => {
          if (!isGhostRace) return {};
          const counts = {};
          playersList.forEach(p => counts[p.id] = 0);
          Object.values(ghostHints).forEach(cellHints => {
              Object.keys(cellHints).forEach(uid => {
                  if (counts[uid] !== undefined) counts[uid]++;
              });
          });
          // 自己精確的進度
          const myAccurateCount = localCells.filter(c => !c.isGiven && c.value !== null && !conflictCellIds.has(c.id)).length;
          counts[myId] = Math.max(counts[myId] || 0, myAccurateCount);

          const result = {};
          Object.keys(counts).forEach(uid => {
              result[uid] = totalEmpty > 0 ? Math.min(100, Math.round((counts[uid] / totalEmpty) * 100)) : 0;
          });
          return result;
      }, [isGhostRace, ghostHints, playersList, localCells, conflictCellIds, totalEmpty, myId]);

      // 區域完成判斷與禮物發送
      useEffect(() => {
          if (!isGhostRace || isGenerating || !localCells.length || isSpectator || matchPhase !== 'playing') return;
          const solution = solutionGridRef.current;
          if (!solution) return;
          
          let newComps = 0;
          const s = cSizeDef.size;
          const chars = cSizeDef.chars;
          
          for(let i=0; i<s; i++) {
              if (s !== 4) { // 4x4 模式不發送行列宮的禮物
                  if (!completedRegionsRef.current.has(`R${i}`)) {
                      const rowCells = localCells.filter(c => c.y === i);
                      if (rowCells.length === s && rowCells.every(c => c.value === solution[c.y][c.x])) {
                          completedRegionsRef.current.add(`R${i}`); 
                          if (!rowCells.every(c => c.isGiven)) newComps++;
                      }
                  }
                  if (!completedRegionsRef.current.has(`C${i}`)) {
                      const colCells = localCells.filter(c => c.x === i);
                      if (colCells.length === s && colCells.every(c => c.value === solution[c.y][c.x])) {
                          completedRegionsRef.current.add(`C${i}`); 
                          if (!colCells.every(c => c.isGiven)) newComps++;
                      }
                  }
                  if (!completedRegionsRef.current.has(`B${i}`)) {
                      const boxCells = localCells.filter(c => c.boxId === i);
                      if (boxCells.length === s && boxCells.every(c => c.value === solution[c.y][c.x])) {
                          completedRegionsRef.current.add(`B${i}`); 
                          if (!boxCells.every(c => c.isGiven)) newComps++;
                      }
                  }
              }
          }
          
          chars.forEach((char) => {
              if (!completedRegionsRef.current.has(`N${char}`)) {
                  const numCells = localCells.filter(c => c.value === char);
                  if (numCells.length === s && numCells.every(c => c.value === solution[c.y][c.x])) {
                      completedRegionsRef.current.add(`N${char}`); 
                      if (!numCells.every(c => c.isGiven)) newComps++;
                  }
              }
          });

          if (newComps > 0 && stateRef.current.brawlSettings.allowGifts !== false) {
              for (let k = 0; k < newComps; k++) {
                  // 修正挑選邏輯：排除觀戰者、已過關者，以及自己
                  const winnersIds = stateRef.current.brawlWinners.map(w => w.id);
                  const validPlayers = playersList.filter(p => !p.isSpectator && !winnersIds.includes(p.id) && p.id !== myId);
                  const solvedCounts = { ...ghostProgress };
                  
                  let minScore = Infinity;
                  let candidates = [];
                  
                  validPlayers.forEach(p => {
                      const score = (solvedCounts[p.id] || 0) + (stateRef.current.unopenedGifts[p.id] ? stateRef.current.unopenedGifts[p.id].length : 0);
                      if (score < minScore) {
                          minScore = score;
                          candidates = [p.id];
                      } else if (score === minScore) {
                          candidates.push(p.id);
                      }
                  });

                  if (candidates.length === 0) return; // 沒有合法目標則不發送

                  const targetUid = candidates[Math.floor(Math.random() * candidates.length)];
                  const gid = Math.random().toString(36).substring(2, 10);
                  const msg = { type: 'RECEIVE_GIFT', targetUid, senderUid: myId, id: gid, timestamp: Date.now() };
                  
                  if (engineRef.current === 'peerjs') {
                      if (isHostRef.current) connsRef.current.forEach(c => c.send(msg)); 
                      else if (connRef.current) connRef.current.send(msg);
                      
                      setUnopenedGifts(prev => {
                          const q = prev[targetUid] || [];
                          return { ...prev, [targetUid]: [...q, myId] };
                      });
                  } else if (engineRef.current === 'firebase' && roomRef.current) {
                      // Firebase 模式：改用子集合 addDoc 避免覆蓋
                      addDoc(collection(roomRef.current, "events"), { ...msg, createdAt: serverTimestamp() }).catch(e => console.error(e));
                  }
              }
          }
      }, [localCells, isGhostRace, isGenerating, cSizeDef.size, cSizeDef.chars, ghostHints, isSpectator, matchPhase, conflictCellIds, ghostProgress, playersList, brawlWinners]);

      useEffect(() => {
          if (!activeCells || activeCells.length === 0 || isGenerating || winner || matchPhase !== 'playing' || isSpectator) return;
          const isFull = activeCells.every(c => c.value !== null);
          const hasNoConflicts = conflictCellIds.size === 0;
          
          if (isFull && hasNoConflicts) {
              if (isGhostRace) {
                  if (!isWinnerDeclaredRef.current) {
                      isWinnerDeclaredRef.current = true;
                      const finishTime = Date.now();
                      const isBrawl = stateRef.current.isBrawlMode;
                      if (!isBrawl) { setEndTime(finishTime); setMatchPhase('finished'); }
                      else { 
                          setIsSpectator(true); 
                          // 不再設為 waiting，保持在 playing 才能看到進度條
                          showToast("🏁 恭喜完成！已進入觀戰模式，觀察對手中..."); 
                      }
                      
                      const me = playersList.find(p => p.id === myId);
                      const winInfo = { id: myId, name: me ? me.name : "玩家", color: me ? me.color : COLORS[0], time: formatTime(Math.floor((finishTime - (matchStartTime || startTime))/1000)), isBrawl };
                      const msgId = Math.random().toString(36).substring(2, 10);
                      const msg = { type: 'GHOST_I_WON', senderUid: myId, id: msgId, time: finishTime, winInfo };
                      
                      if (engineRef.current === 'peerjs') {
                          if (isHostRef.current) {
                              if (!isBrawl) { setWinner(winInfo); connsRef.current.forEach(c => c.send({ type: 'GHOST_WINNER', winner: winInfo })); }
                              else if (handleBrawlWinRef.current) handleBrawlWinRef.current(winInfo);
                          } else if (connRef.current) connRef.current.send(msg);
                      } else if (engineRef.current === 'firebase' && roomRef.current) {
                          addDoc(collection(roomRef.current, "events"), { ...msg, createdAt: serverTimestamp() }).catch(e => console.error(e));
                          if (isHostRef.current && handleMultiplayerWinRef.current) handleMultiplayerWinRef.current(winInfo);
                      }
                  }
              } else {
                  if (!isWon) { setIsWon(true); setEndTime(Date.now()); setHideVictoryModal(false); setMatchPhase('finished'); }
              }
          } else {
              if (isWon) { setIsWon(false); setEndTime(null); setMatchPhase('playing'); }
          }
      }, [activeCells, conflictCellIds.size, isWon, isGenerating, isGhostRace, winner, matchStartTime, startTime, playersList, myId, matchPhase, isSpectator]);

      // 觸控縮放
      useEffect(function() {
        if (screen !== 'game') return; const el = zoomContainerRef.current; if (!el) return; let touchStartY = null;
        const handleTouchStart = (e) => { if (e.touches.length === 1) touchStartY = e.touches[0].clientY; };
        const handleTouchMove = (e) => {
          if (interactionMode >= 2 || isSpectator) return; 
          if (e.touches.length === 2) {
            e.preventDefault(); const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            if (lastPinchDist.current) {
              const delta = dist - lastPinchDist.current; let newZoom = Math.min(Math.max(zoomLevelRef.current + delta * 0.005, 0.4), 3.5);
              if (svgW * newZoom > MAX_SAFE_DIMENSION || svgH * newZoom > MAX_SAFE_DIMENSION) newZoom = Math.min(MAX_SAFE_DIMENSION / svgW, MAX_SAFE_DIMENSION / svgH);
              zoomLevelRef.current = newZoom; if (svgRef.current) { svgRef.current.style.width = `${svgW * newZoom}px`; svgRef.current.style.height = `${svgH * newZoom}px`; }
              if (zoomModeIdxRef.current !== 0) { setZoomModeIdx(0); zoomModeIdxRef.current = 0; }
            }
            lastPinchDist.current = dist;
          } else if (e.touches.length === 1 && touchStartY !== null) {
            if (Math.abs(e.touches[0].clientY - touchStartY) > 30 && !isHeaderCollapsed) setIsHeaderCollapsed(true);
          }
        };
        const handleTouchEnd = () => { lastPinchDist.current = null; touchStartY = null; if (zoomLevel !== zoomLevelRef.current) setZoomLevel(zoomLevelRef.current); };

      const syncState = (partial, shouldBroadcast = true) => {

      const eraseAtPoint = (cx, cy) => {
          const offsets = [[0,0], [15,0], [-15,0], [0,15], [0,-15], [10,10], [-10,-10], [10,-10], [-10,10]];
          let hitIds = new Set();
          for (let off of offsets) {

              for (let el of els) {

            }
        }

        const msg = { type: 'CLICK', uid: myId, x: pt.x, y: pt.y }; 
        if (isHostRef.current) connsRef.current.forEach(c => c.send(msg)); else if (connRef.current) connRef.current.send(msg);
      };

      const handlePointerMove = (e) => {
        if (matchPhase !== 'playing' || isSpectator) return;
        const pt = getSvgCoords(e.clientX, e.clientY);
        
        if (interactionMode === 2) {
            if (drawSubMode === 'eraser') { if (pt && eraserRef.current) { eraserRef.current.setAttribute('cx', pt.x); eraserRef.current.setAttribute('cy', pt.y); if (eraserRef.current.style.display === 'none') eraserRef.current.style.display = 'block'; } if ((e.buttons > 0 || e.pointerType === 'touch') && Date.now() - lastEraseTimeRef.current > 50) { eraseAtPoint(e.clientX, e.clientY); lastEraseTimeRef.current = Date.now(); } } else if (drawSubMode === 'pen' && isDrawingRef.current && pt && currentPathDataRef.current) { currentPathDataRef.current += ` L ${pt.x} ${pt.y}`; if (drawingPathRef.current) { drawingPathRef.current.setAttribute('d', currentPathDataRef.current); } }
        } else {
            // 防手震：如果移動超過10px就取消長按判定
            if (cellLongPressTimer.current && touchStartPt.current && pt) {

                }
            }
        }

        if (pt) {

            if (engineRef.current === 'peerjs') {
                if (isHostRef.current) connsRef.current.forEach(c => c.send(msg)); else if (connRef.current) connRef.current.send(msg); 
            } else if (engineRef.current === 'firebase' && roomRef.current) {
                // Firebase 模式：使用節流的高頻更新同步游標位置
                updateDoc(roomRef.current, { [`cursors.${myId}`]: { x: pt.x, y: pt.y, updatedAt: Date.now() } }).catch(e => {});
            }
        }
      };

      const handlePointerUp = (e) => {
        if (matchPhase !== 'playing' || isSpectator) return;
        
        if (cellLongPressTimer.current) {
            clearTimeout(cellLongPressTimer.current);
            cellLongPressTimer.current = null;
        }

        if (interactionMode === 2) {
            if (drawSubMode === 'pen' && isDrawingRef.current) { 
                isDrawingRef.current = false;

                    const newStroke = { id: Date.now() + '-' + myId, uid: myId, path: currentPathDataRef.current };
                    if (engineRef.current === 'firebase' && roomRef.current) {

                    } else {

                    currentPathDataRef.current = ""; 
                    if (drawingPathRef.current) drawingPathRef.current.style.display = 'none';

            if (e.type === 'pointerleave' || e.type === 'pointercancel' || e.pointerType === 'touch') if (eraserRef.current) eraserRef.current.style.display = 'none';
        }
      };

      const clearOwnStrokes = () => { 
          const filtered = stateRef.current.strokes.filter(s => !s.id.endsWith('-' + myId));
          if (engineRef.current === 'firebase' && roomRef.current) {
              updateDoc(roomRef.current, { "gameState.strokes": filtered }).catch(e=>{});
          } else {
              syncState({ strokes: filtered });

          showToast("🗑️ 已清除你所有的塗鴉");

      const clearAllStrokes = () => { 
          if (isHostRef.current) { 
              if (engineRef.current === 'firebase' && roomRef.current) {
                  updateDoc(roomRef.current, { "gameState.strokes": [] }).catch(e=>{});
              } else {

      const switchToOffline = () => {

      const startSinglePlayer = () => { switchToOffline(); setScreen('game'); setIsHeaderCollapsed(false); generateAndSync(sizeId, diffId, 'coop'); };

      const initiateHostGame = async () => {

        setIsGenerating(false); setUnopenedGifts({}); completedRegionsRef.current.clear(); processedEventsRef.current.clear();

      const joinExistingGame = () => {

      const setupFirebase = async (rId, pName, isCreating) => {

        const rDoc = doc(db, 'artifacts', typeof __app_id !== 'undefined' && __app_id ? __app_id : 'default-app-id', 'public', 'data', 'rooms', rId); roomRef.current = rDoc;

            if (data.gameState) {

              if (gs.localCells && gs.localCells.length > 0) {

                      setIsSpectator(isHostRef.current && gs.isBrawlMode);
                  } 
              }
              if (gs.isGhostRace !== undefined) setIsGhostRace(gs.isGhostRace); if (gs.winner !== undefined) setWinner(gs.winner);
              if (gs.keyMapping !== undefined) setKeyMapping(gs.keyMapping);
              if (gs.solutionGrid !== undefined) { const parsedGrid = typeof gs.solutionGrid === 'string' ? JSON.parse(gs.solutionGrid) : gs.solutionGrid; solutionGridRef.current = parsedGrid; gs.solutionGrid = parsedGrid; }
              if (gs.sizeId !== undefined) { setSizeId(gs.sizeId); } if (gs.diffId !== undefined) setDiffId(gs.diffId);
              if (gs.isBrawlMode !== undefined) setIsBrawlMode(gs.isBrawlMode);

              stateRef.current = { ...stateRef.current, ...gs };

          }, function(err) { showToast("⚠️ 網路波動，同步中..."); });

          // Firebase 子集合事件監聽 (禮物、進度、波紋)

          onSnapshot(qEvents, (snapshot) => {
              snapshot.docChanges().forEach((change) => {

                          processedEventsRef.current.add(ev.id);
                          if (ev.type === 'RECEIVE_GIFT') {
                              setUnopenedGifts(prev => {

                              });
                          } else if (ev.type === 'GIFT_OPENED') {

                                      return { ...prev, [ev.uid]: nq };

                              }
                          } else if (ev.type === 'GIFT_COUNTER_ATTACK' && ev.targetUid === myId) {

                          }
                      }

              });
          });
        } catch(e) { setIsConnecting(false); switchToOffline(); showToast(e.message === "TIMEOUT" ? "⚠️ 連線逾時！請確認權限" : "⚠️ 雲端連線失敗"); }
      };

      const setupPeerJS = (rId, pName, isCreating) => {
        if (isCreating) {
            const p = new Peer('yyh-tgsh-' + rId + '-host'); peerRef.current = p;
            p.on('open', function() {
              setIsHost(true); isHostRef.current = true; setIsSpectator(false); setRoomId(rId); setScreen('game'); setIsHeaderCollapsed(false); setIsConnecting(false); setPlayersList([{ id: myId, name: pName, isHost: true, color: getAvailableColor([]), isReady: false, isSpectator: false }]);
              p.on('connection', function(c) {
                connsRef.current.push(c);
                c.on('data', function(m) {
                  if (m.type === 'JOIN') {
                      // 檢查名稱是否重複
                      if (playersListRef.current.some(p => p.name === m.pName && p.id !== m.uid)) {

                      const isSpec = (stateRef.current.isGhostRace || stateRef.current.isBrawlMode) && stateRef.current.matchPhase === 'playing';
                      setPlayersList(prev => {

                          if (prev.find(pl => pl.id === m.uid)) nList = prev.map(pl => pl.id === m.uid ? { ...pl, name: m.pName, isSpectator: isSpec } : pl); 
                          // 主機端主動分配不重複顏色，忽略客戶端傳來的顏色
                          else nList = [...prev, { id: m.uid, name: m.pName || "玩家", isHost: false, color: getAvailableColor(prev), isReady: false, isSpectator: isSpec }]; 
                          connsRef.current.forEach(conn => { 
                              if (conn === c) conn.send({ type: 'INIT', data: { ...stateRef.current, solutionGrid: solutionGridRef.current }, players: nList, isSpectator: isSpec }); 
                              else if (conn.open) conn.send({ type: 'PLAYERS_UPDATE', players: nList });

                          return nList;

                  } else if (m.type === 'LEAVE') { setPlayersList(prev => { const nList = prev.filter(pl => pl.id !== m.uid); connsRef.current.forEach(conn => { if (conn !== c && conn.open) conn.send({ type: 'PLAYERS_UPDATE', players: nList }); }); return nList; });
                  } else if (m.type === 'SYNC') { syncState(m.data, false); connsRef.current.forEach(conn => { if(conn.peer !== c.peer) conn.send({ type: 'SYNC', data: m.data }); });
                  } else if (m.type === 'GHOST_SOLVED') { connsRef.current.forEach(conn => { if(conn.peer !== c.peer) conn.send(m); }); setGhostHints(prev => ({ ...prev, [m.cellId]: { ...(prev[m.cellId]||{}), [m.uid]: m.color } }));

                      if (isHostRef.current) {

                      }
                  } else if (m.type === 'REQ_COLOR_CHANGE') { setPlayersList(prev => { const nList = prev.map(pl => pl.id === m.targetId ? { ...pl, color: m.color } : pl); connsRef.current.forEach(conn => conn.send({ type: 'PLAYERS_UPDATE', players: nList })); return nList; });
                  } else if (m.type === 'REQ_NAME_CHANGE') {

                      }
                  } else if (m.type === 'CURSOR') { connsRef.current.forEach(conn => { if(conn.peer !== c.peer) conn.send(m); }); setCursors(prev => ({ ...prev, [m.uid]: { x: m.x, y: m.y } }));
                  } else if (m.type === 'CLICK') { connsRef.current.forEach(conn => { if(conn.peer !== c.peer) conn.send(m); }); setRipples(prev => [...prev, { id: Date.now() + Math.random(), uid: m.uid, x: m.x, y: m.y, timestamp: Date.now() }]);
                  } else if (m.type === 'RECEIVE_GIFT') {
                      connsRef.current.forEach(conn => { if(conn.peer !== c.peer) conn.send(m); });
                      setUnopenedGifts(prev => {
                          const q = prev[m.targetUid] || [];
                          return { ...prev, [m.targetUid]: [...q, m.senderUid || 'system'] };
                      });
                  } else if (m.type === 'GIFT_OPENED') {
                      connsRef.current.forEach(conn => { if(conn.peer !== c.peer) conn.send(m); });
                      setUnopenedGifts(prev => {
                          const q = prev[m.uid] || [];
                          const nq = [...q];
                          nq.shift();
                          return { ...prev, [m.uid]: nq };

                  } else if (m.type === 'GIFT_COUNTER_ATTACK') {
                      connsRef.current.forEach(conn => { if(conn.peer !== c.peer) conn.send(m); });
                      if (m.targetUid === myId) { if (handleReceiveCounterAttackRef.current) handleReceiveCounterAttackRef.current(); }
                  } else if (m.type === 'REQ_READY') {
                      setPlayersList(prev => { const nList = prev.map(p => p.id === m.targetId ? { ...p, isReady: true } : p); connsRef.current.forEach(conn => conn.send({ type: 'PLAYERS_UPDATE', players: nList })); return nList; });
                  }
                });

              });
            });
            p.on('error', function() { setIsConnecting(false); switchToOffline(); showToast("⚠️ 無法建立對局大廳，請重試"); });
        } else {
            const guestP = new Peer(); peerRef.current = guestP;

                const c = guestP.connect('yyh-tgsh-' + rId + '-host'); connRef.current = c;
                c.on('open', function() { setIsHost(false); isHostRef.current = false; setRoomId(rId); setScreen('game'); setIsHeaderCollapsed(false); setIsConnecting(false); c.send({ type: 'JOIN', pName: pName || "玩家", uid: myId, color: myColorRef.current }); });
                c.on('data', function(m) {

                  }
                  else if (m.type === 'INIT') { if (m.isSpectator !== undefined) setIsSpectator(m.isSpectator); if (m.players) setPlayersList(m.players); if (m.data) { if(m.data.solutionGrid) solutionGridRef.current = m.data.solutionGrid; syncState({ ...m.data, localCells: JSON.parse(JSON.stringify(m.data.localCells || m.data.cells)) }, false); if(m.data.isGhostRace && m.data.startTime) setMatchStartTime(m.data.startTime); } }
                  else if (m.type === 'SYNC') { syncState(m.data, false); if(m.data.isGhostRace && m.data.startTime) setMatchStartTime(m.data.startTime); }
                  else if (m.type === 'PLAYERS_UPDATE') { if (m.players) setPlayersList(m.players); }
                  else if (m.type === 'GHOST_SOLVED') { setGhostHints(prev => ({ ...prev, [m.cellId]: { ...(prev[m.cellId]||{}), [m.uid]: m.color } })); }
                  else if (m.type === 'GHOST_WINNER') { setWinner(m.winner); if(m.winner.id === myId) setEndTime(Date.now()); }
                  else if (m.type === 'CURSOR') setCursors(prev => ({ ...prev, [m.uid]: { x: m.x, y: m.y } }));
                  else if (m.type === 'CLICK') setRipples(prev => [...prev, { id: Date.now() + Math.random(), uid: m.uid, x: m.x, y: m.y, timestamp: Date.now() }]);
                  else if (m.type === 'REQ_REJOIN') connRef.current.send({ type: 'JOIN', pName: myNameRef.current || "玩家", uid: myId, color: myColorRef.current });
                  else if (m.type === 'RECEIVE_GIFT') { 
                      setUnopenedGifts(prev => {
                          const q = prev[m.targetUid] || [];
                          return { ...prev, [m.targetUid]: [...q, m.senderUid || 'system'] };
                      });
                  }
                  else if (m.type === 'GIFT_OPENED') {
                      if (m.uid !== myId) {
                          setUnopenedGifts(prev => {
                              const q = prev[m.uid] || [];
                              const nq = [...q];
                              nq.shift();
                              return { ...prev, [m.uid]: nq };
                          });
                      }
                  }
                  else if (m.type === 'GIFT_COUNTER_ATTACK') { if (m.targetUid === myId) { if (handleReceiveCounterAttackRef.current) handleReceiveCounterAttackRef.current(); } }
                });
                c.on('close', function() { showToast("⚠️ 主機已離線，切換為單機模式"); switchToOffline(); });

                      );
                  })}
              </svg>
          )}

          {/* === 獨立選色/設定面板 === */}
          {colorPickerTarget && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm pointer-events-auto animate-fadeIn" onClick={(e) => { e.stopPropagation(); setColorPickerTarget(null); setColorSeq([]); }}>
              <div className="bg-[#fffdfa] border-[3px] border-slate-800 rounded-xl p-4 shadow-[8px_8px_0px_rgba(30,41,59,1)] animate-popUpCenter max-w-[280px] w-full mx-4" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-3 border-b-2 border-slate-800 pb-2">
                  <h3 className="text-sm font-black text-slate-800">⚙️ 個人設定</h3>
                  <button onClick={() => { setColorPickerTarget(null); setColorSeq([]); }} className="text-slate-400 hover:text-slate-800 font-black text-lg leading-none">✕</button>
                </div>
                
                <div className="mb-4">
                  <label className="block text-[10px] md:text-xs font-bold text-slate-600 mb-1">修改暱稱：</label>
                  <div className="flex gap-2">
                     <input type="text" value={editName} onChange={e => setEditName(e.target.value)} placeholder="輸入新暱稱" className="w-full border-2 border-slate-800 rounded px-2 py-1 text-xs font-bold outline-none focus:ring-1 ring-[#ffcc00]" />
                     <button onClick={(e) => {
                         e.stopPropagation();
                         const newName = editName.trim();
                         if (!newName) return showToast("⚠️ 暱稱不能為空");
                         if (playersList.some(p => p.name === newName && p.id !== colorPickerTarget)) return showToast("⚠️ 此暱稱已被其他人使用");
                         handlePlayerNameChange(colorPickerTarget, newName);
                         setColorPickerTarget(null);
                         setColorSeq([]);
                     }} className="bg-blue-500 text-white font-bold text-[10px] md:text-xs px-3 rounded border-2 border-slate-800 hover:bg-blue-600 active:translate-y-[1px] whitespace-nowrap">儲存</button>
                  </div>
                </div>

                <label className="block text-[10px] md:text-xs font-bold text-slate-600 mb-1">修改代表色：</label>
                <div className="grid grid-cols-5 gap-2">
                  {COLORS.map(color => (
                    <button key={color} onClick={(e) => { e.stopPropagation(); const colorIdx = COLORS.indexOf(color); let newSeq = [...colorSeq, colorIdx]; const targetSeq = [0, 4, 15, 19]; let isValid = true; for (let i = 0; i < newSeq.length; i++) { if (newSeq[i] !== targetSeq[i]) { isValid = false; break; } } if (isValid) { setColorSeq(newSeq); if (newSeq.length === 4) { handlePlayerColorChange(colorPickerTarget, 'rainbow'); setColorPickerTarget(null); showToast("🌈 解鎖隱藏彩色漸變！"); setColorSeq([]); } else handlePlayerColorChange(colorPickerTarget, color); } else { setColorSeq([]); handlePlayerColorChange(colorPickerTarget, color); setColorPickerTarget(null); } }} className="w-8 h-8 rounded-full border-[2px] border-slate-800 shadow-[2px_2px_0px_rgba(30,41,59,1)] hover:scale-110 hover:shadow-[3px_3px_0px_rgba(30,41,59,1)] transition-all active:scale-95 active:shadow-none mx-auto" style={{ backgroundColor: color }} title={color} />
                  ))}
                </div>
              </div>
            </div>
          )}

          {showSaveModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-[#fffdfa] border-[4px] border-[#2d2a26] rounded-2xl p-6 shadow-[10px_10px_0px_rgba(30,41,59,1)] w-full max-w-md animate-popUpCenter">
                <h2 className="text-2xl font-black text-slate-800 mb-2 border-b-4 border-blue-500 inline-block pb-1">💾 存檔與讀檔</h2>
                <p className="text-sm font-bold text-slate-600 mb-4">將進度轉換為代碼，下次貼上代碼即可恢復！</p>
                <div className="mb-6">
                  <button onClick={handleSaveCode} className="w-full py-3 bg-blue-500 text-white border-4 border-slate-800 rounded-xl font-black shadow-[4px_4px_0px_rgba(30,41,59,1)] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_rgba(30,41,59,1)] transition-all mb-3 text-base md:text-lg">產生進度代碼 (自動複製)</button>
                  <div className="relative">
                    <textarea id="saveCodeTextarea" value={saveCode} onChange={(e) => setSaveCode(e.target.value)} placeholder="點擊上方按鈕生成，或是手動貼上舊代碼至此處" rows="4" className="w-full border-4 border-slate-800 rounded-xl p-3 pb-12 font-mono text-sm shadow-inner outline-none focus:bg-blue-50 break-all bg-white" />
                    <button onClick={handleQuickPaste} className="absolute bottom-3 right-3 bg-[#ffcc00] text-slate-900 px-3 py-1.5 rounded-lg text-sm font-black border-2 border-slate-800 hover:bg-[#e6b800] shadow-[2px_2px_0px_rgba(30,41,59,1)] transition-all active:translate-y-1 active:shadow-none">📋 快速貼上</button>
                  </div>
                </div>
                <div className="flex gap-4">
                  <button onClick={() => setShowSaveModal(false)} className="flex-1 py-3 bg-white border-4 border-slate-800 rounded-xl font-black text-slate-800 shadow-[4px_4px_0px_rgba(30,41,59,1)] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_rgba(30,41,59,1)] transition-all">關閉</button>
                  <button onClick={handleLoadCode} className="flex-1 py-3 bg-emerald-400 text-slate-900 border-4 border-slate-800 rounded-xl font-black shadow-[4px_4px_0px_rgba(30,41,59,1)] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_rgba(30,41,59,1)] transition-all">載入代碼</button>
                </div>
              </div>
            </div>
          )}
          {toastMsg && (
              <div className="fixed top-10 left-1/2 transform -translate-x-1/2 bg-white text-slate-800 px-6 py-3 rounded-xl border-[3px] border-slate-800 font-black shadow-[4px_4px_0px_rgba(30,41,59,1)] z-[100] animate-slideUpFade flex items-center justify-center gap-2 whitespace-pre-line text-center">
                  {toastMsg}
              </div>
          )}
        </div>
      );
    }

    const renderApp = () => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(SudokuGame));
    };

    if (window.firebaseAPI) {
      initApp();
      renderApp();
    } else {
      window.addEventListener('firebase-ready', () => {
        initApp();
        renderApp();
      });
    }
  </script>
</body>
</html>
