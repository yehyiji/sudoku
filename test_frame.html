<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>
  <div id="output"></div>
  <script>
    fetch('index.html').then(r => r.text()).then(html => {
      const match = html.match(/<script type=\"text\/babel\">([\s\S]*?)<\/script>/);
      const code = Array(484).join('\n') + match[1];
      try {
        Babel.transform(code, { presets: ['es2015', 'react', 'stage-2'] });
        document.getElementById('output').innerText = "SUCCESS";
      } catch(e) {
        document.getElementById('output').innerText = "ERROR_MESSAGE:\n" + e.message;
      }
    });
  </script>
</body>
</html>
